<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LFCSD Days</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="https://raw.githubusercontent.com/lfcsd/lfcsd.github.io/refs/heads/main/favicon-lfcsd.png">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyB6yxt2JX4ubnFsiYf2stfdnHeqjNySiJc",
      authDomain: "lfcsd-days.firebaseapp.com",
      projectId: "lfcsd-days",
      storageBucket: "lfcsd-days.appspot.com",
      messagingSenderId: "520576481150",
      appId: "1:520576481150:web:b08a50be7b0d15e113e52f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.firebase = { db, app, firestore: { getFirestore } };
  </script>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({ appId: "b655dea8-a108-4112-9cbb-f5f6e3c9e012" });
    });
  </script>

  <script src="script.js" type="module" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="Main">
    <div class="nav-left">
      <img src="/logo.png" alt="LFCSD Logo" class="nav-logo">
      <span class="nav-title">LFCSD Days</span>
    </div>
  </nav>

  <!-- ANNOUNCEMENT MODAL -->
  <div id="announcementPopup" class="install-popup hidden" role="dialog" aria-modal="true" aria-label="Announcement">
    <div class="popup-card announcement-card">
      <div class="announcement-header">
        <i class="fas fa-triangle-exclamation warning-icon"></i>
        <h2 id="popupTitle">Announcement</h2>
      </div>
      <p class="muted" id="popupDescription"></p>
      <div class="popup-actions">
        <button id="dismissAnnouncement" class="dismiss">Close</button>
      </div>
    </div>
  </div>

  <!-- SCHEDULE MODAL -->
<div id="schedulePopup" class="install-popup hidden" role="dialog" aria-modal="true" aria-label="Today's Schedule">
  <div class="popup-card schedule-popup-card">
    <div class="schedule-popup-header">
      <h2 id="schedulePopupTitle">Today's Schedule</h2>
    </div>

    <div id="schedulePopupBody" class="schedule-popup-body"></div>

    <div class="popup-actions">
      <button id="dismissSchedulePopup" class="dismiss schedule-dismiss">Close</button>
    </div>
  </div>
</div>

  <!-- MAIN -->
  <main class="card home-layout">
    <!-- LEFT -->
    <section class="home-left">
      <img src="/logo.png" class="main-logo" alt="logo">

      <div id="specialSchedule"></div>

      <div class="day-header-row">
        <button id="prevViewedDayBtn" class="calendar-nav-btn day-nav-btn hidden" aria-label="Previous viewed day">
          <i class="fas fa-chevron-left"></i>
        </button>

        <div id="dayText" class="day-text">Loading...</div>

        <button id="nextViewedDayBtn" class="calendar-nav-btn day-nav-btn" aria-label="Next viewed day">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div id="periodsContainer" class="periods-container"></div>
      <div id="timeDisplay" class="time-display"></div>

      <div class="controls-row">
        <button id="reportBtn" class="pill report-pill">Incorrect?</button>
      </div>
    </section>

    <!-- RIGHT -->
    <section class="home-right">
      <div class="calendar-panel">
        <div class="calendar-header-row home-calendar-header">
          <button id="prevMonthBtn" class="calendar-nav-btn" aria-label="Previous month">
            <i class="fas fa-chevron-left"></i>
          </button>

          <div id="calendarTitle" class="calendar-title">Loading...</div>

          <button id="nextMonthBtn" class="calendar-nav-btn" aria-label="Next month">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>

        <div class="calendar-legend home-calendar-legend">
          <div class="legend-item">
            <span class="legend-dot legend-half"></span>
            <span>Half Day</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-off"></span>
            <span>No School</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-conf"></span>
            <span>Sup. Conf. / Special</span>
          </div>
        </div>

        <div class="calendar-shell home-calendar-shell">
          <div class="calendar-weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <div id="calendarNotes" class="calendar-notes"></div>
      </div>
    </section>
  </main>

  <footer class="footer">This website is not affiliated with LFCSD</footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/OneSignalSDKWorker.js');
    }
  </script>

</body>
</html>
