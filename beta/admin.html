<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFCSD Days Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
body{margin:0;padding:0;font-family:'Lexend',sans-serif;background:linear-gradient(135deg,#6a0dad,#8a2be2);color:white;min-height:100vh;}
.admin-panel,.login-container{max-width:600px;margin:50px auto;background:rgba(0,0,0,0.7);padding:30px;border-radius:15px;text-align:center;}
.form-group{margin-bottom:15px;text-align:left;}
.form-group label{display:block;margin-bottom:5px;font-weight:bold;}
.form-group input,.form-group textarea{width:100%;padding:10px;border-radius:5px;border:none;font-family:'Lexend',sans-serif;}
button{padding:10px 15px;border:none;border-radius:5px;cursor:pointer;font-family:'Lexend',sans-serif;transition:background 0.3s;}
.admin-btn{background:#8a2be2;color:white;margin:5px;} .admin-btn:hover{background:#6a0dad;}
.apply-btn{background-color:#4CAF50;}
.clear-btn{background-color:#f44336;}
.logout-btn{background:#ff6b6b;color:white;display:block;margin:20px auto;}
.admin-buttons{display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
</style>
</head>
<body>
<div class="login-container" id="loginContainer">
  <h2>Admin Login</h2>
  <form id="loginForm">
    <div class="form-group"><label>Email:</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Password:</label><input type="password" id="password" required></div>
    <button type="submit" class="admin-btn">Login</button>
  </form>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
  <h2>Bell Schedule Today</h2>
  <div class="admin-buttons">
    <button class="admin-btn" onclick="setScheduleMode('regular')">Regular Day</button>
    <button class="admin-btn" onclick="setScheduleMode('half')">Half Day</button>
  </div>

  <div id="periodInputs"></div>
  <button class="admin-btn apply-btn" id="applyPeriods">Apply Changes</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyB6yxt2JX4ubnFsiYf2stfdnHeqjNySiJc",
  authDomain:"lfcsd-days.firebaseapp.com",
  projectId:"lfcsd-days"
});
const auth = firebase.auth();
const db = firebase.firestore();

const loginContainer=document.getElementById('loginContainer');
const adminPanel=document.getElementById('adminPanel');
const periodInputs=document.getElementById('periodInputs');
const applyBtn=document.getElementById('applyPeriods');

let currentPeriods = [];

const predefined = {
  regular: [
    { name: "HR", start: "08:00", end: "08:20" },
    { name: "1", start: "08:24", end: "09:04" },
    { name: "2", start: "09:08", end: "09:48" },
    { name: "3", start: "09:52", end: "10:32" },
    { name: "4", start: "10:36", end: "11:16" },
    { name: "5", start: "11:20", end: "12:00" },
    { name: "6", start: "12:04", end: "12:44" },
    { name: "7", start: "12:48", end: "13:28" },
    { name: "8", start: "13:32", end: "14:12" },
    { name: "9", start: "14:16", end: "14:54" }
  ],
  half: [
    { name: "1", start: "08:00", end: "08:21" },
    { name: "2", start: "08:24", end: "08:45" },
    { name: "3", start: "08:48", end: "09:09" },
    { name: "4", start: "09:12", end: "09:33" },
    { name: "5", start: "09:36", end: "09:57" },
    { name: "6", start: "10:00", end: "10:20" },
    { name: "7", start: "10:23", end: "10:43" },
    { name: "8", start: "10:46", end: "11:06" },
    { name: "9", start: "11:09", end: "11:30" }
  ]
};

function renderPeriods(periods){
  currentPeriods = [...periods];
  periodInputs.innerHTML='';
  periods.forEach((p,i)=>{
    const div = document.createElement('div');
    div.className='form-group';
    div.innerHTML=`
      <label>Period ${p.name}</label>
      <input type="text" value="${p.start}" placeholder="Start (HH:MM)" data-index="${i}" class="start-time">
      <input type="text" value="${p.end}" placeholder="End (HH:MM)" data-index="${i}" class="end-time">
    `;
    periodInputs.appendChild(div);
  });
}

function setScheduleMode(mode){
  const periods = predefined[mode]||[];
  renderPeriods(periods);
  db.collection('bellSchedules').doc('today').set({mode, periods})
    .then(()=>alert(mode+' schedule applied!'))
    .catch(e=>alert(e));
}

applyBtn.addEventListener('click',()=>{
  const inputs = periodInputs.querySelectorAll('input');
  inputs.forEach(input=>{
    const idx = input.dataset.index;
    if(input.classList.contains('start-time')) currentPeriods[idx].start=input.value;
    if(input.classList.contains('end-time')) currentPeriods[idx].end=input.value;
  });
  db.collection('bellSchedules').doc('today').set({mode:'custom', periods:currentPeriods})
    .then(()=>alert('Custom schedule applied!'))
    .catch(e=>alert(e));
});

// SIMPLE LOGIN (admin claim assumed for demo)
document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  auth.signInWithEmailAndPassword(email,password)
    .then(()=>{loginContainer.style.display='none'; adminPanel.style.display='block';})
    .catch(err=>alert(err.message));
});

function logout(){auth.signOut().then(()=>{loginContainer.style.display='block'; adminPanel.style.display='none';});}
</script>
</body>
</html>
